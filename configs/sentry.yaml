#####-----工业相机参数-----#####
use_back_camera: false
camera_name: "hikrobot"
rotate_180_deg: true
exposure_ms: 6
gain: 16
# serial_number: "DA8184833" # 2026.3.17 当前调试车上的
serial_number: "DA7447428" # 2026.3.21 sentry
vid_pid: "2bdf:0001"

#####-----日志/Profiler/ros2图像节点参数-----#####
profile_log_enabled: true
profile_log_flush_every: 100 # 每x帧刷新一次日志
profile_log_stdout_enabled: false
profile_log_file_enabled: false
profile_log_ros2_topic_enabled: true

enable_ros2_image_publish: true # false 时不发布 /sp_vision/image_raw 与 /sp_vision/image_autoaim

#####-----ROS2参数-----#####
nav_subscriber:
  ros__parameters:
    imu_topic: "/ecat/sn4653115/app2/read"  # IMU话题，原sn4587585已不可用

#####-----神经网络/预测参数-----#####
use_traditional: true
min_confidence: 0.8
use_kalman: true

#####-----yolo参数-----#####
yolo_name: yolov5
device: GPU
classify_model: assets/tiny_resnet.onnx
yolo11_model_path: assets/yolo11.xml
yolov8_model_path: assets/yolov8.xml
yolov5_model_path: assets/yolov5.xml

#####-----ROI-----#####
roi: 
  x: 420
  y: 50
  width: 600
  height: 600

use_roi: false

#####-----USB相机参数-----#####
use_usb_cameras: false
image_width: 1280
image_height: 1024
fov_h: 41.0 #87.7
fov_v: 33.4 
new_fov_h: 27 #67
new_fov_v: 40.9
usb_frame_rate: 120
usb_exposure: 2500 #1-80000______250
usb_gamma: 160
usb_gain: 10 #0-96

#####-----传统方法参数-----#####
threshold: 80
max_angle_error: 45 # degree
min_lightbar_ratio: 1.5
max_lightbar_ratio: 20
min_lightbar_length: 8
min_armor_ratio: 1
max_armor_ratio: 5
max_side_ratio: 1.5
max_rectangular_error: 25 # degree
min_confidence: 0.8

#####-----cboard参数-----#####
cboard_enabled: false
quaternion_canid: 0x01
bullet_speed_canid: 0x110
send_canid: 0xff
can_enabled: false
can_interface: "can0"

#####-----tracker参数-----#####
min_detect_count: 5
max_temp_lost_count: 25
outpost_max_temp_lost_count: 75

#####-----aimer参数-----#####
yaw_offset: -0.8 # degree -2.5
pitch_offset: -1  # degree 2
comming_angle: 60 # degree
leaving_angle: 20 # degree
left_yaw_offset: -1
right_yaw_offset: -0.6
decision_speed: 10 # rad/s
high_speed_delay_time: 0.026 # s
low_speed_delay_time: 0.010 # s
pitch_guard_max_error_deg: 2.0
pitch_cmd_max_step_deg: 0.5

#####-----shooter参数-----#####
first_tolerance: 5 # 近距离射击容差，degree
second_tolerance: 2 # 远距离射击容差，degree
judge_distance: 3 #距离判断阈值
auto_fire: true # 是否由自瞄控制射击

#####-----工业相机标定参数-----#####
R_gimbal2imubody: [1, 0, 0, 0, 1, 0, 0, 0, 1]

# 重投影误差: 0.1833px
camera_matrix: [2414.9359264386621, 0, 717.26243105567414, 0, 2418.0489262208148, 582.68540529942845, 0, 0, 1]
distort_coeffs: [-0.0209453389287673, 0.15028138841073832, -0.0006517722113234505, -0.0016861906197686788, 0]

# 相机同理想情况的偏角: yaw-1.11 pitch0.01 roll-0.06 degree
# 标定板到世界坐标系原点的水平距离: 1.20 m
# 标定板同竖直摆放时的偏角: yaw123.89 pitch14.05 roll-0.86 degree
R_camera2gimbal: [0, 0, 1, -1, 0, 0, 0, -1, 0]
t_camera2gimbal: [0.1284, 0.0, 0.0552]
